kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
# Map host ports to the per-env app NodePorts and the dashboard, so everything
# is reachable at http://localhost:<port> with no `kubectl port-forward`.
# Host ports are templated by setup.sh from BASE_PORT (default 8080):
#   dev app 8080 / dashboard 8081 / staging app 8082 / prod app 8083
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080   # dev app     (Service demo in demo-dev)
        hostPort: ${DEV_PORT}
        protocol: TCP
      - containerPort: 30081   # dashboard   (Service rollout-dashboard)
        hostPort: ${DASH_PORT}
        protocol: TCP
      - containerPort: 30082   # staging app (Service demo in demo-staging)
        hostPort: ${STAGING_PORT}
        protocol: TCP
      - containerPort: 30083   # prod app    (Service demo in demo-prod)
        hostPort: ${PROD_PORT}
        protocol: TCP
