kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
# Map host ports to NodePort Services so the app and dashboard are reachable at
# http://localhost:<port> with no `kubectl port-forward`. Host ports are
# templated by setup.sh (APP_HOST_PORT / DASH_HOST_PORT, default 8080 / 8081)
# so you can avoid clashes with anything already bound on those ports.
nodes:
  - role: control-plane
    extraPortMappings:
      # demo app  -> Service demo (NodePort 30080)
      - containerPort: 30080
        hostPort: ${APP_HOST_PORT}
        protocol: TCP
      # dashboard -> Service rollout-dashboard (NodePort 30081)
      - containerPort: 30081
        hostPort: ${DASH_HOST_PORT}
        protocol: TCP
