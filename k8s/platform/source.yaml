# GitOps source + Kustomization for the demo app.
#
# Flux pulls this repo, renders k8s/app, and applies it into the `demo`
# namespace. The image tag is injected via postBuild substitution:
#   - GITHUB_OWNER : static, set once at setup time
#   - APP_VERSION  : owned by the kuberik Rollout named `demo` (see the
#                    rollout.kuberik.com/substitute annotation). The Rollout
#                    patches this value to promote a new release.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: demo
  namespace: demo
spec:
  interval: 1m
  url: ${REPO_URL}
  ref:
    branch: ${GITHUB_BRANCH}
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: demo
  namespace: demo
  annotations:
    rollout.kuberik.com/substitute.APP_VERSION.from: "demo"
spec:
  interval: 1m
  retryInterval: 15s
  prune: true
  # Deliberately NOT `wait: true`: the kuberik HealthCheck (class: kustomization)
  # is the health gate — it checks the managed resources' health independently.
  # Flux's own blocking wait would stall the one-time bootstrap render (before
  # the Rollout has set APP_VERSION) on an un-pullable image and push the
  # Rollout past its deployTimeout.
  wait: false
  targetNamespace: demo
  sourceRef:
    kind: GitRepository
    name: demo
  path: ./k8s/app
  postBuild:
    substitute:
      GITHUB_OWNER: "${GITHUB_OWNER}"
      # NOTE: APP_VERSION is intentionally absent here. It is owned solely by the
      # Rollout `demo` (via the rollout.kuberik.com/substitute annotation above),
      # which patches it to promote a release. Keeping it out of this manifest
      # means re-running setup.sh never clobbers the promoted version.
