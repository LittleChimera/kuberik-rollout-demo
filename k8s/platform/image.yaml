# Flux image scanning: watch the published demo images on ghcr and expose the
# newest semver release to the kuberik Rollout via the ImagePolicy.
#
# The demo package is public, so no pull secret is needed. For a private
# package, add `secretRef: { name: ghcr-auth }` and create that secret (see
# README).
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: demo
  namespace: demo
spec:
  image: ghcr.io/${GITHUB_OWNER}/kuberik-rollout-demo
  interval: 1m
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: demo
  namespace: demo
spec:
  imageRepositoryRef:
    name: demo
  policy:
    semver:
      range: ">=0.0.1"
