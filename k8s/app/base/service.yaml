apiVersion: v1
kind: Service
metadata:
  name: demo
  labels:
    app: demo
spec:
  # NodePort so kind's host port mapping reaches it directly. Each env overlay
  # patches nodePort to a unique value (dev 30080 / staging 30082 / prod 30083).
  type: NodePort
  selector:
    app: demo
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
