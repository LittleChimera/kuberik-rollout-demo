name: release

# Publish a new demo image whenever a semver tag (v1.2.3) is pushed.
# The image lands at ghcr.io/<owner>/kuberik-rollout-demo and is tagged with
# the bare semver (1.2.3), which is what the Flux ImagePolicy selects on.
on:
  push:
    tags:
      - "v*"
  # Manual builds for iterating without cutting a git tag.
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.2.3)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and image
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            # refs/tags/v1.2.3 -> 1.2.3
            version="${GITHUB_REF_NAME#v}"
          fi
          # ghcr requires a lowercase repository name.
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${owner}/kuberik-rollout-demo" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          build-args: |
            VERSION=${{ steps.v.outputs.version }}
          tags: |
            ${{ steps.v.outputs.image }}:${{ steps.v.outputs.version }}
            ${{ steps.v.outputs.image }}:latest

      - name: Summary
        run: |
          echo "Pushed \`${{ steps.v.outputs.image }}:${{ steps.v.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
