name: app-release

# Publish a new APP IMAGE when an app-v* tag is pushed (e.g. app-v1.0.1).
# This is the "image" version stream, driven by the demo-app Rollout.
on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "App version to build (e.g. 1.0.1)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and image
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#app-v}"   # app-v1.0.1 -> 1.0.1
          fi
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${owner}/kuberik-rollout-demo" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          provenance: false
          build-args: |
            VERSION=${{ steps.v.outputs.version }}
          tags: |
            ${{ steps.v.outputs.image }}:${{ steps.v.outputs.version }}
          # oci-mediatypes=true is required for the annotations below to land on
          # the manifest. The rollout-controller reads
          # org.opencontainers.image.revision and records it as the release's git
          # SHA; the environment-controller then uses that SHA as the ref when
          # reporting to GitHub Deployments, which drives dev->staging->prod
          # promotion.
          outputs: type=image,oci-mediatypes=true,push=true
          annotations: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.v.outputs.version }}

      - run: echo "Pushed \`${{ steps.v.outputs.image }}:${{ steps.v.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
